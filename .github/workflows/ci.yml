name: CI

# arduino-lint is the same check the Arduino Library Manager bot runs on the
# registry-submission PR, so passing it here first avoids a rejected PR.
# compile-sketches builds the examples against the ESP32 core + M5Unified.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  arduino-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Arduino Lint (library-manager submit ruleset)
        uses: arduino/arduino-lint-action@v2
        with:
          library-manager: submit
          compliance: strict
          project-type: library

  compile-examples:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        fqbn:
          - esp32:esp32:m5stack_core   # M5Stack Basic (ESP32)
          - esp32:esp32:m5stack_cores3 # M5Stack CoreS3 (ESP32-S3)
    steps:
      - uses: actions/checkout@v4
      - name: Compile examples
        uses: arduino/compile-sketches@v1
        with:
          fqbn: ${{ matrix.fqbn }}
          platforms: |
            - name: esp32:esp32
          libraries: |
            - name: M5Unified
            - source-path: ./   # this library
          sketch-paths: |
            - examples/M5Stack_Command
            - examples/M5Stack_SineStream
