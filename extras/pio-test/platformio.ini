; Multi-board build/flash harness for the Hapbeat Arduino library.
; Lives in extras/ (ignored by the Arduino IDE). M5Unified abstracts the M5
; board differences, so the SAME sketch (src/main.cpp) runs on every M5 model —
; only the `board` (chip family) changes per environment.
;
;   pio run -e cores3                 # build for M5Stack CoreS3
;   pio run -e cores3 -t upload --upload-port COMx   # flash it
;   pio run                            # build the default env (cores3)
;
; Copy secrets.h.example -> secrets.h and fill in Wi-Fi + event id first.

[platformio]
default_envs = cores3
src_dir = src

[env]
; Pinned to the version the Hapbeat device-firmware builds with (the unpinned
; latest espressif32 hits a littlefs-python import bug in this PlatformIO install).
platform = espressif32@6.5.0
framework = arduino
monitor_speed = 115200
; Find the Hapbeat library one level up (repos-sdk/) via the local source tree.
lib_extra_dirs = ../../..
lib_deps =
    m5stack/M5Unified@^0.2.2

; ---- ESP32-S3 boards ----
[env:cores3]
board = m5stack-cores3

[env:atoms3]
board = m5stack-atoms3
build_flags = -DHB_SINGLE_BUTTON  ; one user button -> kit-free 160 Hz HOLD

[env:stamps3]
board = m5stack-stamps3
build_flags = -DHB_SINGLE_BUTTON  ; one user button -> kit-free 160 Hz HOLD

; ---- ESP32 boards ----
[env:core]
board = m5stack-core-esp32

[env:core2]
board = m5stack-core2

[env:fire]
board = m5stack-fire

[env:atom]
board = m5stack-atom
build_flags = -DHB_SINGLE_BUTTON  ; one user button -> kit-free 160 Hz HOLD

[env:stickc]
board = m5stick-c
